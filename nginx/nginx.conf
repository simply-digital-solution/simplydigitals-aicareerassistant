upstream api {
    server unix:/run/app/app.sock;
}

# Redirect all HTTP to HTTPS
server {
    listen 80;
    server_name api.aicareerassistant.simplydigitals.com.sg;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name api.aicareerassistant.simplydigitals.com.sg;

    # SSL certificates — managed by Certbot (Let's Encrypt) on the EC2 host
    ssl_certificate     /etc/letsencrypt/live/api.aicareerassistant.simplydigitals.com.sg/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.aicareerassistant.simplydigitals.com.sg/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # API — proxy to Gunicorn via Unix socket
    location /api/ {
        proxy_pass         http://api;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Health check — no auth required
    location /health {
        proxy_pass http://api;
    }

    # Everything else → 404 (frontend is served from CloudFront/S3)
    location / {
        return 404;
    }
}
