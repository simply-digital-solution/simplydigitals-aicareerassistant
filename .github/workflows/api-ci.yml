name: API CI

on:
  workflow_call:
    inputs:
      run_lint:
        required: false
        type: boolean
        default: false
      run_tests:
        required: false
        type: boolean
        default: false
      run_deploy:
        required: false
        type: boolean
        default: false
    secrets:
      AWS_ACCESS_KEY_ID:     { required: false }
      AWS_SECRET_ACCESS_KEY: { required: false }
      AWS_ACCOUNT_ID:        { required: false }
      AWS_REGION:            { required: false }
      ECR_REPOSITORY:        { required: false }
      DATABASE_URL:          { required: false }
      JWT_SECRET_KEY:        { required: false }
      GEMINI_API_KEY:        { required: false }
      HCAPTCHA_SECRET_KEY:   { required: false }
      GOOGLE_CLIENT_ID:      { required: false }
      GOOGLE_CLIENT_SECRET:  { required: false }
      PROD_API_URL:          { required: false }

permissions:
  contents: read
  id-token: write
  pull-requests: write

env:
  PYTHON_VERSION: "3.11"
  # Safe CI-only values — never used in production
  DATABASE_URL: "sqlite+aiosqlite:///:memory:"
  JWT_SECRET_KEY: "ci-secret-key-at-least-32-chars-long!!"
  APP_ENV: "testing"
  ENABLE_SCHEDULER: "false"

defaults:
  run:
    working-directory: api

jobs:

  # ── 1. LINT — feature branch push ────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    if: inputs.run_lint
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: api/pyproject.toml

      - name: Install dependencies
        run: pip install ruff

      - name: Ruff
        run: ruff check app tests

  # ── 2. UNIT TESTS + COVERAGE — pull request ───────────────────────────────
  unit-tests:
    name: Unit Tests & Coverage
    runs-on: ubuntu-latest
    if: inputs.run_tests
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: api/pyproject.toml

      - name: Install dependencies
        run: pip install poetry && poetry install --with dev

      - name: Run pytest with coverage
        run: |
          poetry run pytest tests/ \
            --cov=app \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --junitxml=pytest-report.xml \
            -v

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-test-results-${{ github.run_id }}
          path: |
            api/pytest-report.xml
            api/coverage.xml
          retention-days: 7

  # ── 3. SECURITY — pull request ────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    if: inputs.run_tests
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: api/pyproject.toml

      - name: Install dependencies
        run: pip install poetry bandit pip-audit && poetry install

      - name: Bandit SAST
        run: |
          poetry run bandit -r app -ll -f json -o bandit-report.json || true
          poetry run bandit -r app -ll

      - name: pip-audit CVE scan
        run: |
          poetry export --without dev --without-hashes -f requirements.txt | \
            pip-audit -r /dev/stdin --desc

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: api
          severity: HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: true
          format: table

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-bandit-report-${{ github.run_id }}
          path: api/bandit-report.json
          retention-days: 7

  # ── 4. VERSION — merge to main ────────────────────────────────────────────
  version:
    name: Resolve Version
    runs-on: ubuntu-latest
    if: inputs.run_deploy
    outputs:
      version:    ${{ steps.resolve.outputs.version }}
      is_release: ${{ steps.resolve.outputs.is_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve version
        id: resolve
        run: |
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA:0:7}"
          GIT_TAG=$(git tag --points-at HEAD | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          if [ -n "$GIT_TAG" ]; then
            VERSION="${GIT_TAG#v}"
            IS_RELEASE="true"
          else
            LAST_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
            if [ -n "$LAST_TAG" ]; then
              DISTANCE=$(git rev-list ${LAST_TAG}..HEAD --count)
              BASE="${LAST_TAG#v}"
              VERSION="${BASE}-dev.${DISTANCE}-${SHORT_SHA}"
            else
              VERSION="0.0.0-dev-${SHORT_SHA}"
            fi
            IS_RELEASE="false"
          fi
          echo "version=$VERSION"       >> $GITHUB_OUTPUT
          echo "is_release=$IS_RELEASE" >> $GITHUB_OUTPUT
          echo "Version: $VERSION (release=$IS_RELEASE)"

  # ── 5. BUILD — merge to main ─────────────────────────────────────────────
  build:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    needs: [version]
    if: inputs.run_deploy
    outputs:
      registry: ${{ steps.ecr.outputs.registry }}
      image:    ${{ steps.ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: api
          push: true
          platforms: linux/amd64
          provenance: false
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:${{ needs.version.outputs.version }}
            ${{ steps.ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:latest
          build-args: |
            APP_VERSION=${{ needs.version.outputs.version }}

  # ── 6. DEPLOY — runs directly on EC2 via self-hosted runner ──────────────
  deploy:
    name: Deploy to EC2
    runs-on: [self-hosted, ec2, production]
    needs: [version, build]
    env:
      DATABASE_URL: ""
      JWT_SECRET_KEY: ""
      APP_ENV: ""
      ENABLE_SCHEDULER: ""
    if: inputs.run_deploy
    environment:
      name: production
    steps:
      - uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          MISSING=""
          [ -z "${{ secrets.DATABASE_URL }}"          ] && MISSING="$MISSING DATABASE_URL"
          [ -z "${{ secrets.JWT_SECRET_KEY }}"        ] && MISSING="$MISSING JWT_SECRET_KEY"
          [ -z "${{ secrets.GEMINI_API_KEY }}"        ] && MISSING="$MISSING GEMINI_API_KEY"
          [ -z "${{ secrets.AWS_ACCOUNT_ID }}"        ] && MISSING="$MISSING AWS_ACCOUNT_ID"
          [ -z "${{ secrets.AWS_REGION }}"            ] && MISSING="$MISSING AWS_REGION"
          [ -z "${{ secrets.ECR_REPOSITORY }}"        ] && MISSING="$MISSING ECR_REPOSITORY"
          if [ -n "$MISSING" ]; then
            echo "❌ Missing required secrets:$MISSING"
            exit 1
          fi
          DB="${{ secrets.DATABASE_URL }}"
          if echo "$DB" | grep -q "sqlite"; then
            echo "❌ DATABASE_URL points to SQLite — must be PostgreSQL in production"
            exit 1
          fi
          echo "✅ All required secrets present and DATABASE_URL is non-SQLite"

      - name: Detect migration changes
        id: migration_check
        uses: dorny/paths-filter@v3
        with:
          filters: |
            migrations:
              - 'api/migrations/versions/**'

      - name: Write .env file
        run: |
          mkdir -p /home/ubuntu/app
          cat > /home/ubuntu/app/.env << ENVEOF
          APP_ENV=production
          LOG_LEVEL=INFO
          ENABLE_SCHEDULER=false
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          HCAPTCHA_SECRET_KEY=${{ secrets.HCAPTCHA_SECRET_KEY }}
          GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REDIRECT_URI=${{ secrets.PROD_API_URL }}/api/v1/auth/google/callback
          ECR_IMAGE=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPOSITORY }}:${{ github.sha }}
          ENVEOF

      - name: Copy compose and nginx config
        run: |
          cp $GITHUB_WORKSPACE/docker-compose.prod.yml /home/ubuntu/app/
          cp -r $GITHUB_WORKSPACE/nginx/ /home/ubuntu/app/

      - name: Authenticate Docker with ECR
        run: |
          ECR_REGISTRY="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com"
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | \
            docker login --username AWS --password-stdin "$ECR_REGISTRY"

      - name: Pull and deploy containers
        timeout-minutes: 10
        run: |
          cd /home/ubuntu/app
          source .env

          echo "▶ Pulling image: $ECR_IMAGE"
          docker pull "$ECR_IMAGE"

          echo "▶ Stopping existing containers and removing stale networks"
          docker compose -f docker-compose.prod.yml down --remove-orphans || true

          echo "▶ Starting containers"
          docker compose -f docker-compose.prod.yml up -d --no-build

          echo "▶ Waiting for migrate container to finish (max 60s)"
          for i in $(seq 1 12); do
            STATE=$(docker inspect --format='{{.State.Status}}' app-migrate-1 2>/dev/null || echo "missing")
            echo "  [$i/12] migrate=$STATE"
            [ "$STATE" = "exited" ] && break
            sleep 5
          done
          EXIT_CODE=$(docker inspect --format='{{.State.ExitCode}}' app-migrate-1 2>/dev/null || echo "1")
          if [ "$EXIT_CODE" != "0" ]; then
            echo "❌ migrate container failed — logs:"
            docker logs app-migrate-1 --tail=40
            exit 1
          fi

          echo "▶ Waiting for api Unix socket to be ready (max 90s)"
          for i in $(seq 1 18); do
            STATUS=$(docker inspect --format='{{.State.Status}}' app-api-1 2>/dev/null || echo "missing")
            RESTARTING=$(docker inspect --format='{{.State.Restarting}}' app-api-1 2>/dev/null || echo "false")
            echo "  [$i/18] api status=$STATUS restarting=$RESTARTING"
            if [ "$RESTARTING" = "true" ]; then
              echo "❌ api container is crash-looping — logs:"
              docker logs app-api-1 --tail=50
              exit 1
            fi
            # Check the socket is accepting connections inside the container
            if docker exec app-api-1 curl -sf --unix-socket /run/app/app.sock http://localhost/health > /dev/null 2>&1; then
              echo "✅ api socket is ready"
              break
            fi
            if [ "$i" = "18" ]; then
              echo "❌ api socket never became ready — logs:"
              docker logs app-api-1 --tail=50
              exit 1
            fi
            sleep 5
          done

      - name: Run database migrations
        if: steps.migration_check.outputs.migrations == 'true'
        run: |
          cd /home/ubuntu/app
          docker compose -f docker-compose.prod.yml run --rm migrate
          echo "Migrations applied successfully"

      - name: Health check
        run: |
          PROD_URL="${{ secrets.PROD_API_URL }}"
          echo "Health check: ${PROD_URL}/health"
          for i in $(seq 1 3); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${PROD_URL}/health")
            echo "Attempt $i — HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "✅ API is live"
              exit 0
            fi
            if [ "$STATUS" = "502" ] || [ "$STATUS" = "503" ]; then
              echo "  nginx returned $STATUS — api logs:"
              docker logs app-api-1 --tail=20
              docker logs app-nginx-1 --tail=10
            fi
            sleep 10
          done
          echo "❌ Health check failed after 3 attempts"
          docker logs app-api-1 --tail=50
          docker logs app-nginx-1 --tail=20
          exit 1

      - name: Deployment summary
        if: always()
        run: |
          echo "=================================="
          echo " Version : ${{ needs.version.outputs.version }}"
          echo " Image   : ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPOSITORY }}:${{ github.sha }}"
          echo " Region  : ${{ secrets.AWS_REGION }}"
          echo "=================================="
